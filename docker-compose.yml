# =====================================================================
#  Stack completo on-premise para desarrollo / demo.
#  Levanta:  db (postgres+pgvector) · redis · minio · openldap ·
#            api (FastAPI) · worker (Celery) · beat (retención) ·
#            frontend (Vite) · nginx
#
#  Uso:  cp .env.example .env  &&  make certs  &&  docker compose up --build
# =====================================================================

services:

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
      # init: ejecuta el schema y el seed al crear la BD por primera vez
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9011:9001"          # consola web de MinIO (host 9011; 9001 lo reserva Windows)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  openldap:
    image: bitnamilegacy/openldap:latest
    restart: unless-stopped
    environment:
      LDAP_ROOT: "dc=ejercito,dc=cl"
      LDAP_ADMIN_USERNAME: ${LDAP_ADMIN_USER}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      # usuarios demo (mismas credenciales que el seed de la BD)
      # bitnami exige una password por usuario (listas del mismo largo)
      LDAP_USERS: "operaciones,analista,comandante,auditor,admin"
      LDAP_PASSWORDS: "${LDAP_DEMO_PASSWORD},${LDAP_DEMO_PASSWORD},${LDAP_DEMO_PASSWORD},${LDAP_DEMO_PASSWORD},${LDAP_DEMO_PASSWORD}"
    volumes:
      - ldap_data:/bitnami/openldap

  api:
    build: ./backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      openldap: { condition: service_started }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info --pool=threads --concurrency=4
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }

  beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.worker.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    build: ./frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0 --port 5173
    env_file: .env
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro   # TLS 1.3 (RNF-002); usar certs reales en prod
    depends_on:
      - api
      - frontend

volumes:
  db_data:
  redis_data:
  minio_data:
  ldap_data:
